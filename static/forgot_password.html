<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Initiative ERP - Forgot Password</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');

    :root {
      --ink: #111111;
      --ink-soft: #4d4d4d;
      --line: #d6d6d6;
      --panel: #ffffff;
      --accent: #111111;
      --accent-dark: #000000;
    }

    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at 12% 14%, rgba(0, 0, 0, 0.12) 0%, transparent 32%),
        radial-gradient(circle at 88% 86%, rgba(40, 40, 40, 0.12) 0%, transparent 30%),
        linear-gradient(135deg, #f2f2f2 0%, #fafafa 56%, #f0f0f0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: #fff;
      padding: 34px;
      width: 100%;
      max-width: 410px;
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 48px rgba(12, 35, 59, 0.14);
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
      transform: translateX(-10px);
    }
    .brand-text {
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #d6d6d6;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand-text h1 {
      margin: 0;
      font-size: 42px;
      line-height: 0.95;
      font-family: 'Arial Black', Impact, 'Segoe UI Black', sans-serif;
      font-style: italic;
      color: #000000;
      letter-spacing: -1px;
      font-weight: 900;
      display: inline-block;
      transform: skewX(-10deg);
      text-transform: none;
    }
    .brand-text h2 {
      margin: 2px 0 0;
      font-size: 19px;
      color: var(--ink);
      text-align: center;
      font-weight: 800;
    }
    p { margin-top: 0; text-align: left; color: #5f5f5f; font-size: 13px; }
    label { display: block; margin-top: 12px; font-size: 13px; color: var(--ink-soft); font-weight: 700; }
    input {
      width: 100%;
      padding: 11px 12px;
      margin-top: 6px;
      border: 1px solid #c9c9c9;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.12);
    }
    button {
      width: 100%;
      padding: 11px;
      margin-top: 16px;
      background: linear-gradient(120deg, var(--accent) 0%, #2a2a2a 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }
    button:hover { background: linear-gradient(120deg, var(--accent-dark) 0%, #151515 100%); }
    .msg { min-height: 20px; margin-top: 10px; color: #c0392b; text-align: center; font-size: 14px; }
    .success { color: #2e7d32; }
    a { display: block; text-align: center; margin-top: 14px; color: #111111; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  
    @media (max-width: 380px) {
      body { padding: 12px; }
      .card { padding: 22px; }
      .brand-text h1 { font-size: 34px; }
      .logo { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo"><img src="static/Initiative%20logo.png" alt="Initiative Logo" /></div>
      <div class="brand-text">
        <h1>Initiative</h1>
        <h2>Forgot Password</h2>
      </div>
    </div>
    <p>We'll email you a link to reset your Initiative ERP password.</p>
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter username (optional if email is filled)" />
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Enter email (optional if username is filled)" />
    <button type="button" onclick="resetPassword()">Send Reset Link</button>
    <div id="msg" class="msg"></div>
    <a href="login">Back to Login</a>
  </div>

  <script>
    function appUrl(path) {
      const currentPath = window.location.pathname;
      const appBasePath = currentPath === '/erp' || currentPath.startsWith('/erp/') ? '/erp' : '';
      if (!path) {
        return appBasePath || '/';
      }
      if (/^https?:\/\//i.test(path)) {
        return path;
      }
      return path.startsWith('/') ? `${appBasePath}${path}` : `${appBasePath}/${path}`;
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(appUrl('/sw.js')).catch(() => {});
      });
    }

    async function resetPassword() {
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!username && !email) {
        msg.textContent = 'Please fill: Username or Email.';
        return;
      }

      const response = await fetch(appUrl('/auth/forgot-password'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        msg.textContent = data.detail || 'Unable to process request';
        return;
      }

      msg.classList.add('success');
      msg.textContent = data.message || 'If an account matches those details, a password reset email has been sent.';
    }
  </script>
</body>
</html>
