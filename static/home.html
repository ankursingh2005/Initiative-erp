<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Initiative Data Systems - Workspace</title>
  <style>
    :root { --ink: #182433; --muted: #667085; --line: #d9e1ea; --paper: #f4f7fa; --blue: #155eef; --orange: #d95f00; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink); font-family: Arial, sans-serif; }
    header { min-height: 70px; padding: 14px clamp(18px, 4vw, 56px); display: flex; align-items: center; justify-content: space-between; background: #111827; color: #fff; }
    .brand { font-size: 16px; font-weight: 700; letter-spacing: 0; }
    .user { color: #d0d5dd; font-size: 14px; }
    main { width: min(980px, calc(100% - 36px)); margin: 0 auto; padding: 72px 0 48px; }
    h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: 0; }
    .intro { max-width: 600px; margin: 12px 0 34px; color: var(--muted); line-height: 1.55; }
    .choices { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .choice { min-height: 250px; border: 1px solid var(--line); border-radius: 8px; padding: 26px; background: #fff; display: flex; flex-direction: column; align-items: flex-start; text-align: left; cursor: pointer; transition: border-color .18s, box-shadow .18s, transform .18s; }
    .choice:hover { border-color: currentColor; box-shadow: 0 12px 26px rgba(16, 24, 40, .10); transform: translateY(-2px); }
    .scheme { color: var(--blue); } .purchase { color: var(--orange); }
    .icon { width: 48px; height: 48px; border-radius: 8px; display: grid; place-items: center; font-size: 24px; background: currentColor; color: #fff; }
    .choice h2 { margin: auto 0 10px; font-size: 22px; color: var(--ink); }
    .choice p { margin: 0; color: var(--muted); line-height: 1.5; }
    .choice span { margin-top: 22px; font-size: 14px; font-weight: 700; color: currentColor; }
    .logout { border: 1px solid #98a2b3; background: transparent; color: #fff; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-weight: 600; }
    @media (max-width: 650px) { main { padding-top: 42px; } h1 { font-size: 27px; } .choices { grid-template-columns: 1fr; } .choice { min-height: 210px; } }
  </style>
</head>
<body>
  <header>
    <div class="brand">INITIATIVE DATA SYSTEMS (P) LTD.</div>
    <div><span id="user" class="user"></span> <button class="logout" onclick="logout()">Log out</button></div>
  </header>
  <main>
    <h1 id="welcome">Welcome</h1>
    <p class="intro">Choose the workspace you need. Your work is securely saved to the shared company system.</p>
    <div class="choices">
      <button class="choice scheme" onclick="go('/dashboard')">
        <div class="icon" aria-hidden="true">S</div>
        <h2>Schemes</h2>
        <p>Manage sales entries, scheme claims, and related reports.</p>
        <span>Open Schemes</span>
      </button>
      <button class="choice purchase" onclick="go('/purchase-orders')">
        <div class="icon" aria-hidden="true">PO</div>
        <h2>Purchase Orders</h2>
        <p>Create stock requisitions and track the Busy purchase order process.</p>
        <span>Open Purchase Orders</span>
      </button>
    </div>
  </main>
  <script>
    function appUrl(path) { const p = location.pathname; const base = p === '/erp' || p.startsWith('/erp/') ? '/erp' : ''; return `${base}${path}`; }
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    if (!token) location.href = appUrl('/login');
    document.getElementById('user').textContent = username || '';
    document.getElementById('welcome').textContent = `Welcome${username ? `, ${username}` : ''}`;
    function go(path) { location.href = appUrl(path); }
    function logout() { localStorage.clear(); location.href = appUrl('/login'); }
  </script>
</body>
</html>
