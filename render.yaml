services:
  - type: web
    name: idspl
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: idspl-postgres
          property: connectionString
      # Gmail App Password for initiative.lucknow@gmail.com. Host, user,
      # port, and from-address already default to that Gmail account in the
      # code, so this is the only email setting you must fill in yourself.
      # Render will prompt for the value in the dashboard (never committed
      # to the repo). See README.md "Email sending" section for how to
      # generate it.
      - key: SMTP_PASSWORD
        sync: false
      # Anthropic API key used to read attached scheme documents
      # (image/PDF/Excel) and pre-fill Scheme Maintenance drafts. Optional:
      # if left unset, document upload still works but scheme fields must be
      # filled in manually instead of being auto-extracted. See README.md
      # "Scheme documents (OCR + LLM extraction)" section.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Used to build the working reset-password link in the emailed
      # message. Set this to your Render web service's public URL, e.g.
      # https://idspl.onrender.com (no trailing slash).
      - key: APP_BASE_URL
        sync: false

databases:
  - name: idspl-postgres
    databaseName: idspl
    user: idspl
    # Free Render Postgres databases expire after 30 days. Use a persistent
    # paid tier for business data.
    plan: basic-256mb